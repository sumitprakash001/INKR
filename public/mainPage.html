<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <style>
    * { box-sizing: border-box; }

      height: 100%;
      margin: 0;
      font-family: Arial, sans-serif;

    }

      background: #111827;
      color: #fff;
      padding: 10px 16px;
      font-weight: 600;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 300px;
      height: calc(100vh - 44px);
    }

    .canvas-wrap { background: #fff; }
    canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: #fff;
      touch-action: none;
    }

      color: #fff;
      padding: 14px;
      overflow: auto;
    }

    .toolbox {
      background: #101c33;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 12px;
    }

      background: #06b6d4;
      border: none;
      color: #042027;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }

    /* Chat styling */
    #chatBox {
      list-style: none;
      padding: 0;
      max-height: 150px;
      overflow-y: auto;
    }
    #chatBox li {
      margin: 5px 0;
      padding: 8px;
      border-radius: 5px;
      max-width: 70%;
      word-break: break-word;
    }
    .self {
      background: #22c55e;
      text-align: right;
      margin-left: auto;
      color: #042027;
    }
    .other {
      background: #38bdf8;
      text-align: left;
      color: #042027;
    }

    /* Word display */
    #currentWordBox {
      background: #101c33;
      color: #22c55e;
      padding: 10px;
      border-radius: 6px;
      text-align: center;
      font-weight: 600;
      font-size: 16px;
      box-shadow: inset 0 0 6px rgba(0,255,100,0.2);
    }
  </style>
</head>

<body>
  <div class="topbar">🖊️ Inkr — Draw Together</div>

  <div class="container">
    <div class="canvas-wrap">
      <canvas id="board"></canvas>
    </div>

    <aside class="sidebar">
      <div class="toolbox">

      </div>

      <!-- 🎯 Current Word Display -->
      <div class="toolbox">

        <div id="currentWordBox">Waiting for drawer...</div>
      </div>

      <!-- 👥 Player List -->
      <div class="toolbox">

        <div id="playerList"></div>

  </div>

  <!-- Socket -->
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    // 🧩 Extract room and username from URL
    const params = new URLSearchParams(window.location.search);
    const roomId = params.get("room") || "public";
    const username = params.get("name") || "Guest";

    console.log(`🟢 Joined room: ${roomId} as ${username}`);

    const colorPicker = document.getElementById("colorPicker");
    const sizeRange = document.getElementById("sizeRange");
    const sizeLabel = document.getElementById("sizeLabel");
    const eraserBtn = document.getElementById("eraserBtn");
    const clearBtn = document.getElementById("clearBtn");
    let isDrawing = false;
    let current = { color: colorPicker.value, size: 4, mode: "draw" };
    let lastPos = { x: 0, y: 0 };

    function resizeCanvas() {
      canvas.width = canvas.clientWidth;
      canvas.height = canvas.clientHeight;
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    window.addEventListener("load", resizeCanvas);
    window.addEventListener("resize", resizeCanvas);

    function getPos(e) {

      return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    canvas.addEventListener("mousedown", (e) => { isDrawing = true; lastPos = getPos(e); });

      if (!isDrawing) return;

      ctx.restore();

        roomId, x1: lastPos.x, y1: lastPos.y,

        color: current.color, size: current.size, mode: current.mode
      });
      lastPos = pos;
    });
    canvas.addEventListener("mouseup", () => isDrawing = false);
    canvas.addEventListener("mouseout", () => isDrawing = false);

    socket.on("drawing", (data) => {
      ctx.save();
      if (data.mode === "erase") {
        ctx.globalCompositeOperation = "destination-out";
        ctx.strokeStyle = "rgba(0,0,0,1)";
      } else {
        ctx.globalCompositeOperation = "source-over";
        ctx.strokeStyle = data.color;
      }
      ctx.lineWidth = data.size;
      ctx.beginPath();
      ctx.moveTo(data.x1, data.y1);
      ctx.lineTo(data.x2, data.y2);
      ctx.stroke();
      ctx.restore();
    });

    // --- Chat System ---
    const chatBox = document.getElementById("chatBox");
    const chatInput = document.getElementById("chatInput");
    const sendChatBtn = document.getElementById("sendChatBtn");

    sendChatBtn.onclick = () => {
      const msg = chatInput.value.trim();
      if (!msg) return;
      socket.emit("chat message", { roomId, username, msg });

    socket.on("chat message", (data) => {
      const li = document.createElement("li");
      li.textContent = `${data.username}: ${data.msg}`;
      li.className = data.username === username ? "self" : "other";
      chatBox.appendChild(li);
      chatBox.scrollTop = chatBox.scrollHeight;
    });

    // --- Player List ---
    socket.on("updatePlayerList", (players) => {
      document.getElementById("playerList").innerHTML =
        players.map(p => `<div>${p}</div>`).join("");
    });

    // --- Word Display in Sidebar ---
    const currentWordBox = document.getElementById("currentWordBox");

    // 🎨 Word shown for drawer only
    socket.on("yourWord", (word) => {
      currentWordBox.style.color = "#22c55e";
      currentWordBox.textContent = `You are drawing: ${word}`;
    });

    // ✏️ Others see who is drawing
    socket.on("drawerInfo", (drawerName) => {
      currentWordBox.style.color = "#38bdf8";
      currentWordBox.textContent = `✏️ ${drawerName} is drawing...`;
    });

    // 🎉 When guessed correctly
    socket.on("correctGuess", ({ username, word }) => {
      const li = document.createElement("li");
      li.textContent = `🎉 ${username} guessed the word: ${word}!`;
      li.style.color = "#22c55e";
      chatBox.appendChild(li);
      chatBox.scrollTop = chatBox.scrollHeight;
      currentWordBox.textContent = `✔️ ${username} guessed it!`;
      currentWordBox.style.color = "#22c55e";
    });
  </script>
</body>
</html>
